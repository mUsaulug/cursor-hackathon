# CivicLens Wave 2 — Local Infrastructure
# Kullanım: docker compose up -d
# Backend Go: go run ./cmd/civiclens (ayrı terminalde)
#
# Kafka topic'leri (otomatik oluşur; KAFKA_AUTO_CREATE_TOPICS_ENABLE=true):
#   report lifecycle  : report.created, report.anonymized, report.ai_analyzed, report.dedup_checked
#   task lifecycle    : task.created, task.assigned, task.started,
#                       task.evidence_uploaded, task.ai_verified, task.completed, task.reopened

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine  # PostGIS dahil (spatial dedup için)
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: civiclens
      POSTGRES_USER: civiclens
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-civiclens_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro  # opsiyonel init
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civiclens -d civiclens"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    # allkeys-lru: dedup geohash + dashboard cache + idempotency anahtarları için uygun
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    ports: ["2181:2181"]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # Topic'ler ilk publish/consume anında otomatik oluşur
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
