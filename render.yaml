# Render blueprint for the CivicLens Core Go backend.
# Create a new Blueprint instance from this repo, or a Web Service pointing at
# backend/. The health check path must stay /health.
services:
  - type: web
    name: civiclens-backend
    runtime: go
    rootDir: backend
    plan: free
    buildCommand: go build -o app .
    startCommand: ./app
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PORT
        value: "8080"
      # Set in the Render dashboard — never commit real values.
      # Wave 1 (optional — demo runs precomputed-first without any key):
      # - key: HF_API_TOKEN
      #   sync: false
      # - key: OPENROUTER_API_KEY
      #   sync: false
      # - key: OPENROUTER_MODEL
      #   value: "openai/gpt-4o-mini"
      # - key: GOOGLE_STREET_VIEW_API_KEY
      #   sync: false
      # Wave 2 (optional — CORS, deferred infra):
      # - key: ALLOWED_ORIGIN       # custom prod domain if not *.vercel.app
      #   sync: false
      # W2-5 deferred (swap in-memory stores when ready):
      # - key: POSTGRES_DSN         # postgres://user:pass@host/civiclens?sslmode=require
      #   sync: false
      # - key: REDIS_URL            # redis://user:pass@host:6379/0
      #   sync: false
      # W2-6 deferred (Kafka lifecycle events when ready):
      # - key: KAFKA_BROKERS        # host:9092
      #   sync: false
