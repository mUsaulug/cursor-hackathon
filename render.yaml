# Render blueprint for the CivicLens Core Go backend.
# Create a new Blueprint instance from this repo, or a Web Service pointing at
# backend/. The health check path must stay /health.
services:
  - type: web
    name: civiclens-backend
    runtime: go
    rootDir: backend
    plan: free
    buildCommand: go build -o app .
    startCommand: ./app
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PORT
        value: "8080"
      # Optional — set in the Render dashboard, never commit real values:
      # - key: HF_API_TOKEN
      #   sync: false
      # - key: OPENROUTER_API_KEY
      #   sync: false
